spring:
  application:
    name: feeling-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/coupleapp}
    username: ${SPRING_DATASOURCE_USERNAME:coupleapp}
    password: ${SPRING_DATASOURCE_PASSWORD:coupleapp_secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: feelings
    open-in-view: false
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
server:
  port: 8085
jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-minimum-32-characters-long}
  access-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}
  refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:2592000000}
management.endpoints.web.exposure.include: health,info
