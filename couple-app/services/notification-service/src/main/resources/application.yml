spring:
  application:
    name: notification-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/coupleapp}
    username: ${SPRING_DATASOURCE_USERNAME:coupleapp}
    password: ${SPRING_DATASOURCE_PASSWORD:coupleapp_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: notifications
    open-in-view: false
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: notification-service
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "java.util,com.coupleapp.common.dto"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# Firebase is optional for now — stub mode if not configured
firebase:
  project-id: ${FIREBASE_PROJECT_ID:placeholder}
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:/secrets/firebase-credentials.json}
  enabled: ${FIREBASE_ENABLED:false}

server:
  port: 8089
management:
  endpoints:
    web:
      exposure:
        include: health,info
