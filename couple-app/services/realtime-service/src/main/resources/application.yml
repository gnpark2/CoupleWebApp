spring:
  application:
    name: realtime-service
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
      password: ${SPRING_DATA_REDIS_PASSWORD:redis_secret}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: realtime-service
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.coupleapp.common.dto,java.util"
server:
  port: 8084
jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-minimum-32-characters-long}
  access-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}
  refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:2592000000}
management.endpoints.web.exposure.include: health,info
